services:
  postgres:
    image: postgres:16
    container_name: kiju-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: kiju_gastro
      POSTGRES_USER: kiju
      POSTGRES_PASSWORD: kiju
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
